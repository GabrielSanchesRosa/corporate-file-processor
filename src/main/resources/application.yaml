spring:
  application:
    name: corporate-file-processor

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  management:
    endpoints:
      web:
        exposure:
          include: health, info, metrics

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

file-processor:
  directories:
    input: C:/Corporate file processor/input
    processed: C:/Corporate file processor/processed
    error: C:/Corporate file processor/error

  notification-email: recipient@email.com